[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
disallow_any_generics = False
disallow_subclassing_any = False
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True
show_error_context = True
show_column_numbers = True
pretty = True
ignore_missing_imports = True

# webui_store is outside Phase 1 scope — suppress transitive warn_return_any
# noise that leaks through schema.py → medium_browser.py → webui_store/.
[mypy-webui_store.*]
warn_return_any = False

# Phase 1 (Plan 2026-06-02): progressively strict — core infra modules
[mypy-backlink_publisher._util.*]
disallow_untyped_defs = True

[mypy-backlink_publisher.config.*]
disallow_untyped_defs = True

[mypy-backlink_publisher.schema]
disallow_untyped_defs = True
