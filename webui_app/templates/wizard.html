{% extends 'base.html' %}
{% block title %}Setup Wizard — Backlink Publisher{% endblock %}
{% block head_extra %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css', v=asset_version) }}">
{% endblock %}
{% block content %}
<div id="wizard-app" class="container py-4" style="max-width: 800px;">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <!-- Step progress bar -->
            <div class="d-flex justify-content-between mb-4" id="wizard-progress">
                <div class="wizard-step-indicator" data-step="1" style="flex:1;text-align:center;">
                    <div class="step-circle" style="width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;background:#0d6efd;color:#fff;font-weight:bold;font-size:14px;">1</div>
                    <div class="step-label small mt-1" style="color:#0d6efd;font-weight:500;">Welcome</div>
                </div>
                <div class="wizard-step-indicator" data-step="2" style="flex:1;text-align:center;">
                    <div class="step-circle" style="width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;background:#dee2e6;color:#6c757d;font-weight:bold;font-size:14px;">2</div>
                    <div class="step-label small mt-1" style="color:#6c757d;">Sources</div>
                </div>
                <div class="wizard-step-indicator" data-step="3" style="flex:1;text-align:center;">
                    <div class="step-circle" style="width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;background:#dee2e6;color:#6c757d;font-weight:bold;font-size:14px;">3</div>
                    <div class="step-label small mt-1" style="color:#6c757d;">Channels</div>
                </div>
                <div class="wizard-step-indicator" data-step="4" style="flex:1;text-align:center;">
                    <div class="step-circle" style="width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;background:#dee2e6;color:#6c757d;font-weight:bold;font-size:14px;">4</div>
                    <div class="step-label small mt-1" style="color:#6c757d;">Rules</div>
                </div>
                <div class="wizard-step-indicator" data-step="5" style="flex:1;text-align:center;">
                    <div class="step-circle" style="width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;background:#dee2e6;color:#6c757d;font-weight:bold;font-size:14px;">5</div>
                    <div class="step-label small mt-1" style="color:#6c757d;">Review</div>
                </div>
                <div class="wizard-step-indicator" data-step="6" style="flex:1;text-align:center;">
                    <div class="step-circle" style="width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;background:#dee2e6;color:#6c757d;font-weight:bold;font-size:14px;">6</div>
                    <div class="step-label small mt-1" style="color:#6c757d;">Launch</div>
                </div>
            </div>

            <hr>

            <!-- Step content -->
            <div id="wizard-content">
                <!-- Rendered by JS -->
            </div>

            <!-- Navigation buttons -->
            <div class="d-flex justify-content-between mt-4 pt-3 border-top">
                <button type="button" class="btn btn-outline-secondary" id="wizard-prev" data-wizard-action="prev" style="visibility:hidden;">
                    <i class="bi bi-arrow-left me-1"></i> Back
                </button>
                <div>
                    <button type="button" class="btn btn-outline-secondary me-2" id="wizard-skip" data-wizard-action="skip">
                        Skip wizard
                    </button>
                    <button type="button" class="btn btn-primary" id="wizard-next" data-wizard-action="next">
                        Next <i class="bi bi-arrow-right ms-1"></i>
                    </button>
                    <button type="button" class="btn btn-success d-none" id="wizard-launch" data-wizard-action="launch">
                        <i class="bi bi-play-fill me-1"></i> Start Automation
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block page_data %}
<script>window.__wizardData = {{ wizard_platforms | tojson }}</script>
{% endblock %}
{% block page_module %}
<script type="module" src="{{ url_for('static', filename='js/wizard.js', v=asset_version) }}"></script>
{% endblock %}
