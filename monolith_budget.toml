# Monolith SLOC budget. See:
# - docs/plans/2026-05-18-006-feat-monolith-sloc-ceiling-plan.md
# - docs/brainstorms/2026-05-18-monolith-loc-ceiling-requirements.md
#
# Schema (enforced by tests/test_no_monolith_regrowth.py):
#   each [files."<path>"] entry MUST have:
#     ceiling  -- int, radon SLOC ceiling
#     rationale -- string, >=80 chars explaining current shape + expected settling
#
# Bumping a ceiling requires editing this file in the SAME PR that grows the
# monitored file past the prior ceiling. There is no override label. The defense
# is `git blame` -- every intentional bump leaves a reviewable record with rationale.

