# partial = ["漫画专题文章", "漫画推荐文章", "同人漫画精选", "漫画阅读指南", "漫画专题精选", "成人漫画专题"]
# lsi     = ["同人专题", "阅读指南", "资源精选", "二次元专题", "同好分享", "同好推荐"]

# ────────────────────────────────────────────────────────────
# Anchor profile scheduler — target distribution
# ────────────────────────────────────────────────────────────
# Safe SEO is the default. Use `preset = "safe_seo"` for clarity, or override
# any subset of the four types — the sum must remain 1.0 ± 0.001.
#
# [anchor.proportions]
# preset = "safe_seo"
# # branded = 0.55
# # partial = 0.25
# # exact = 0.10
# # lsi = 0.10

# ────────────────────────────────────────────────────────────
# Anchor distribution alarm — operator-tunable thresholds
# ────────────────────────────────────────────────────────────
# Consumed by `report-anchors --from-profile <main_domain>`. Surfaces three
# rolling-window metrics per target_url (30d + 90d) and emits a breach when
# the 90d window exceeds thresholds known to correlate with Penguin-era
# anchor over-optimization. Breach actions: JSON `alarm` block + per-target
# stderr WARN line + process exit code 6.
#
# Hardcoded defaults if section absent:
#   entropy_floor                = 1.5    (Shannon entropy, base 2)
#   exact_ratio_ceiling          = 0.10   (fraction of anchor_type='exact')
#   top3_concentration_ceiling   = 0.25   (sum of top-3 non-branded anchor texts)
#
# All three are operator-tunable. Set globals here and/or add per-target
# overrides. Precedence (highest wins): per-URL > per-domain > globals
# > hardcoded defaults. Partial overrides fall through layer-by-layer.
#
# Sample-size floor: an alarm only fires once a target has ≥ 20 entries in
# the 90d window. Low-N targets show metrics but never breach.
#
# [anchor_alarm]
# entropy_floor = 1.5
# exact_ratio_ceiling = 0.10
# top3_concentration_ceiling = 0.25
#
# # Per-domain override — applies to every target URL on this domain unless
# # a per-URL override is more specific.
# [[anchor_alarm.override]]
# match = "51acgs.com"
# scope = "domain"
# entropy_floor = 1.8                    # stricter floor for this domain
#
# # Per-URL override — only applies to this exact target_url.
# [[anchor_alarm.override]]
# match = "https://51acgs.com/hot"
# scope = "url"
# exact_ratio_ceiling = 0.05             # one specific target gets tighter ceiling
#
# Acting on a breach: `report-anchors` is a diagnostic. The operator is the
# deciding agent. When a target breaches, pause publishing to it, review and
# rotate the anchor strategy, then re-run. The alarm is a conservative
# lower-bound approximation of Google's actual signal — false-positive cost
# is a 5-min anchor review; false-negative cost is a potential Penguin
# penalty, so defaults favor a permissive floor (sample-size 20 vs the
# domain-level 50 used elsewhere in this tool).

# ────────────────────────────────────────────────────────────
# LLM anchor provider (OPTIONAL — default mode is LLM-free)
# ────────────────────────────────────────────────────────────
# The 51acgs.com block above is sized so the scheduler operates entirely off
# the config-pinned pools — no LLM at runtime. Leave this section commented
# unless you have an intentional reason to thin some pool cell and let the
# LLM fill the gap on demand.
#
# When uncommented:
#   - Used to generate anchor candidates when a typed pool above is empty
#     for a given (url_category, anchor_type) slot
#   - `base_url` MUST be https:// (http:// is rejected at load time)
#   - `api_key` is read from BACKLINK_LLM_API_KEY env var first, then the
#     toml value below as fallback
#   - If you store the key in this file, `chmod 600 config.toml` — a
#     warning is emitted on every run if the file mode is looser
#
# [llm.anchor_provider]
# base_url = "https://api.openai.com/v1"
# # api_key = "sk-..."                   # prefer the BACKLINK_LLM_API_KEY env var
# model = "gpt-4o-mini"
# timeout_s = 30

# ────────────────────────────────────────────────────────────
# [ghpages] — GitHub Pages adapter (Phase 3 Unit 7)
# ────────────────────────────────────────────────────────────
# The PAT does NOT live here — store it in a separate 0600 file at
# ~/.config/backlink-publisher/ghpages-token.json (format: {"token": "<pat>"}).
# Per Plan 2026-05-19-006 SEC-3: TOML files get backed up / screenshotted /
# pushed to dotfile repos. PATs with Contents:Read+Write must never end up
# in TOML.
#
# Token setup (do this once):
#   1. Create a fine-grained PAT at github.com/settings/tokens with
#      "Contents: Read and write" on the target repo.
#   2. echo '{"token":"<paste>"}' > ~/.config/backlink-publisher/ghpages-token.json
#   3. chmod 600 ~/.config/backlink-publisher/ghpages-token.json
#
# [ghpages]
# repo = "your-github-handle/your-pages-repo"
# branch = "gh-pages"                # or "main" for modern Pages repos
# path_template = "_posts/{date}-{slug}.md"

# ────────────────────────────────────────────────────────────
# [image_gen] — AI banner image generation (Plan 2026-05-20-001)
# ────────────────────────────────────────────────────────────
# When configured, plan-backlinks generates a 1200×630 OG banner per
# article using the operator's OpenAI-compatible image-gen endpoint
# (the operator's LLM gateway — e.g. self-hosted, Freepik, fal.ai).
# Banner is downloaded locally and re-uploaded to each platform's own
# CDN at publish time so older backlinks don't break when the source
# CDN's TTL expires.
#
# The API key does NOT live in this file. Run `frw-login` once to
# write it to ~/.config/backlink-publisher/frw-token.json (0600).
#
# Feature is fully opt-in — leave this section commented out for
# text-only backlinks.
#
# [image_gen]
# base_url = "https://api.openai.com/v1"      # any OpenAI-compatible /images/generations endpoint
# model = "dall-e-3"                          # provider-specific; check your gateway's /models
# banner_size = "1200x630"                    # OG default; fall back to 1024x1024 if endpoint rejects non-square
# daily_cap = 50                              # image-gen calls per UTC day; soft fail (skip + warn) past cap
# per_run_cap = 10                            # image-gen calls per plan-backlinks invocation
# timeout_s = 30
# max_retries = 3
# auto_disable_threshold = 5                  # consecutive 401/5xx before auto-disable for the rest of the run
# strict = false                              # true: banner upload failure fails the publish; false: skip banner + publish body anyway

# ─── Mastodon (Plan 2026-05-21-001 Unit 4c) ────────────────────────────────
#
# Single Fediverse instance for chrome-publish. Pick one instance where
# you have a throwaway account dedicated to backlink publish; do NOT use
# your personal Mastodon account (security policy — the publishing Chrome
# profile must not house personal credentials).
#
# Trailing slash optional. Multi-instance support is a follow-up; for
# now pick one instance per workspace and re-bind via Chrome attach for
# each compose run.
#
# [mastodon]
# instance_url = "https://mastodon.social"
