# backlink-publisher configuration
# Copy to: ~/.config/backlink-publisher/config.toml
# Then fill in your values.

# ────────────────────────────────────────────────────────────
# Blogger: map each target main_domain to its Blogger blog_id
# ────────────────────────────────────────────────────────────
[blogger]
"https://your-site.com"       = "1234567890123456789"
"https://another-site.org"    = "9876543210987654321"

# Blogger OAuth2 credentials (desktop/installed-app flow).
# Create credentials at: console.cloud.google.com → APIs & Services → Credentials
# Enable the "Blogger API v3" on the same project.
[blogger.oauth]
client_id     = "your-client-id.apps.googleusercontent.com"
client_secret = "your-client-secret"

# ────────────────────────────────────────────────────────────
# Medium
# ────────────────────────────────────────────────────────────
[medium]
# Integration Token — obtain at: medium.com/me/settings/security → Integration tokens
# Optional: if missing, the browser fallback (Playwright) will be used instead.
# integration_token = "your-medium-integration-token"

[medium.browser]
# Optional: path to the Chrome/Chromium user-data-dir containing your Medium login.
# Defaults to: ~/.config/backlink-publisher/chrome-profile-default/
# user_data_dir = "/path/to/your/chrome/profile"

# ────────────────────────────────────────────────────────────
# Medium OAuth 2.0 (推荐)
# ────────────────────────────────────────────────────────────
# 通过 WebUI Settings 页面授权，无需手动填写
# OAuth Token 会自动保存到: ~/.config/backlink-publisher/medium-token.json
# [medium.oauth]
# client_id     = "your-medium-client-id"
# client_secret = "your-medium-client-secret"

# ────────────────────────────────────────────────────────────
# Work-Themed Backlinks (three-URL form) — RECOMMENDED for new projects
# ────────────────────────────────────────────────────────────
# Each generated article carries THREE backlinks: main_url (branded), list_url
# (partial/exact), and one per-article work_url (work-themed, derived from the
# scraped page title via `work_anchor_templates`). The dispatcher picks this
# path whenever a target carries the three-URL schema below.
#
# Required: main_url (host-root + trailing slash), list_url, three non-empty
# anchor pools (branded_pool / partial_pool / exact_pool).
#
# Optional: work_urls (when empty, the scraper discovers them via the target's
# /sitemap.xml or /sitemap_index.xml, falling back to scraping <a href>
# elements off the list page), work_anchor_templates (default templates use
# `{title}` placeholder), list_path_blocklist (overrides the scraper's default
# nav-path filter — /tag/, /category/, /page/, /author/, /about, /contact,
# /search, /feed), insecure_tls (set true ONLY when the target's TLS chain is
# legitimately broken — this disables certificate verification).
#
# Uncomment + edit:
#
# [targets."https://your-site.com"]
# main_url = "https://your-site.com/"
# list_url = "https://your-site.com/list"
# work_urls = []                                       # empty → scraper auto-discovers
# branded_pool = ["Your Site", "Your Site Hub"]
# partial_pool = ["site hub partial keyword"]
# exact_pool = ["site keyword"]
# # work_anchor_templates = ["{title}", "{title} 详情", "{title} 推荐", "{title} 介绍"]
# # list_path_blocklist = ["/tag/", "/category/", "/page/"]
# # insecure_tls = false

# ────────────────────────────────────────────────────────────
# SEO anchor keywords per target site  (legacy en/ru long-form path)
# ────────────────────────────────────────────────────────────
# Each generated article inserts two backlinks pointing at the target's
# main_domain. Without an entry below, both anchors fall back to the bare
# domain (e.g. "your-site.com") which has near-zero SEO value. Add a pool of
# 5–10 keywords per target — mix branded terms, head terms, and long-tail
# phrases. The renderer picks two distinct keywords per article using a
# deterministic mapping over (url_mode, link position), so distribution
# across articles stays naturally varied.
#
# [targets."https://your-site.com"]
# anchor_keywords = [
#   "your-site",                  # branded
#   "comprehensive content hub",  # head term
#   "in-depth resource guide",    # long-tail
#   "curated reference library",
#   "expert tutorials",
# ]
#
# [targets."https://another-site.org"]
# anchor_keywords = ["another-site", "industry analysis", "data insights"]

# ────────────────────────────────────────────────────────────
# zh-CN short-form path: URL categories + typed anchor pools  (MAINTENANCE MODE)
# ────────────────────────────────────────────────────────────
# Maintenance mode — new projects should prefer the Work-Themed Backlinks
# section above. This path is kept alive: the dispatcher continues to route
# domains that ONLY have a [sites.x] block here through the zh-CN short-form
# flow. Domains that also have a [targets.x] three-URL block are routed
# through the work-themed path instead (a single INFO log notes the
# coexistence — no WARN, no migration pressure).
#
# `save_config` preserves these sections VERBATIM from disk (since Plan
# 2026-05-13-004 Unit 3) — the previous "silent drop" behavior is fixed.
# Edit by hand as before; the WebUI does not write back into [sites.*].
#
# ─── Complete 51acgs.com site config — LLM-free runtime ─────────────────────
#
# This block is sized for "no LLM at runtime" operation: 126 anchors across
# 20 (url_category, anchor_type) cells, with home/branded specifically
# expanded to 15 candidates — that cell sees the heaviest use (~5-6 of the
# 20 sliding dedup-window entries are home/branded), so a thin pool there
# would force the resolver into degrade-to-branded retries.
#
# Verified via 500-article × 3-seed simulation: zero degrades, max
# distribution deviation 1pp from Safe SEO target. Tests live in
# tests/test_config_example_pool.py — if you tweak the candidates, run them
# to make sure the math still holds.
#
# Every entry has been validated against the resolver's _passes_filters:
# 2-8 chars, not in FORBIDDEN_ANCHOR_TEXTS, no unsafe characters, ≥50% CJK.
#
# Anchor type semantics (relative to the page's primary keyword):
#   branded = contains site brand "51"
#   exact   = highly close to the page's main keyword (no brand)
#   partial = contains the main keyword with natural modifiers
#   lsi     = semantically related, no brand, no exact keyword
#
# Uncomment everything below to enable.
#
# [sites."https://51acgs.com".url_categories]
# home = "https://51acgs.com/"
# hot = "https://51acgs.com/comic/hot"
# animate = "https://51acgs.com/animate"
# category = "https://51acgs.com/category"
# topic = "https://51acgs.com/topic/blog"
#
# # ── home (主关键词: 漫画 / 成人漫画) ──
# [sites."https://51acgs.com".anchor_pools.home]
# branded = [
#   "51漫画", "51漫画首页", "51漫画平台", "51漫画推荐", "51漫画站",
#   "51漫画网", "51漫画家", "51漫画馆", "51漫画社", "51漫画大全",
#   "51同人漫画", "51成人漫画", "51漫画精选", "51漫画聚集", "51漫画基地",
# ]
# exact   = ["成人漫画", "漫画", "同人漫画", "本子漫画", "情色漫画"]
# partial = [
#   "成人漫画平台", "在线漫画", "漫画阅读", "同人漫画推荐", "漫画站",
#   "成人漫画站", "成人漫画网", "漫画大全", "在线漫画站",
# ]
# lsi     = [
#   "二次元资源", "同人作品", "同人推荐", "动漫资源", "ACG动漫平台",
#   "同人作品集", "二次元站", "同好分享",
# ]
#
# # ── hot (主关键词: 热门漫画) ──
# [sites."https://51acgs.com".anchor_pools.hot]
# branded = ["51漫画热门", "51漫画排行", "51漫画榜单", "51热门作品", "51人气榜", "51漫画风云榜"]
# exact   = ["热门漫画", "漫画排行", "本周热门", "热门作品", "本周漫画"]
# partial = ["热门漫画排行", "热门漫画推荐", "热门成人漫画", "本周热门漫画", "最新热门漫画", "成人漫画排行"]
# lsi     = ["人气榜单", "人气推荐", "人气作品", "周榜推荐", "人气精选", "周榜单"]
