<!DOCTYPE html>
<html lang="en">
<head><title>Static Site Post with Disqus</title></head>
<body>
  <main>
    <h1>Notes on shipping a static blog</h1>
    <p>This site is generated by a static site generator; comments are outsourced.</p>
  </main>
  <section class="comments">
    <div id="disqus_thread"></div>
    <script>
      var disqus_config = function () { this.page.url = document.location.href; };
      (function() {
        var d = document, s = d.createElement('script');
        s.src = 'https://example-blog.disqus.com/embed.js';
        s.setAttribute('data-timestamp', +new Date());
        (d.head || d.body).appendChild(s);
      })();
    </script>
    <noscript>Please enable JavaScript to view the comments powered by Disqus.</noscript>
  </section>
</body>
</html>
