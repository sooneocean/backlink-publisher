<!DOCTYPE html>
<html lang="en">
<head><title>A WordPress Post</title></head>
<body>
  <article>
    <h1>How we tuned our test suite</h1>
    <p>Long-form article body about flaky tests and what fixed them.</p>
  </article>
  <div id="comments" class="comments-area">
    <h2>3 Comments</h2>
    <ol class="comment-list">
      <li class="comment"><p>Great write-up, thanks!</p></li>
    </ol>
    <div id="respond" class="comment-respond">
      <h3 id="reply-title">Leave a Reply</h3>
      <form action="https://blog.example.com/wp-comments-post.php" method="post" id="commentform">
        <textarea name="comment" id="comment" rows="8" required></textarea>
        <input type="text" name="author" />
        <input type="submit" value="Post Comment" />
      </form>
    </div>
  </div>
</body>
</html>
