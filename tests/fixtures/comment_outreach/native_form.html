<!DOCTYPE html>
<html lang="en">
<head><title>Hand-rolled blog with its own comment form</title></head>
<body>
  <h1>Why I wrote my own comment system</h1>
  <p>A bespoke CMS post. Comments are stored in the same app.</p>
  <section>
    <h2>Add a comment</h2>
    <form action="/posts/42/comments" method="post" class="comment-form">
      <label>Your comment
        <textarea name="comment[body]" rows="6" required></textarea>
      </label>
      <button type="submit">Submit</button>
    </form>
  </section>
</body>
</html>
