version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
    open-pull-requests-limit: 10
    # Group patch-level updates into single PRs to reduce noise
    groups:
      test-deps:
        patterns:
          - "pytest*"
        update-types:
          - "patch"
      dev-deps:
        patterns:
          - "black"
          - "flake8"
          - "radon"
        update-types:
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "ci"
