name: Backlink Publisher CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    # Footprint Regression Gate (Plan Unit 6 / R10) requires PYTHONHASHSEED=0
    # at interpreter startup. Setting it inside Python is a no-op — Python
    # freezes hash randomization at process start. pyproject's
    # [tool.pytest.ini_options].env also pins it via pytest-env, but the
    # job-level env here protects subprocess invocations.
    env:
      PYTHONHASHSEED: "0"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Print radon version
        run: python -m radon --version

      - name: Install Node.js (for JS tests)
        if: hashFiles('webui_app/static/js/package-lock.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webui_app/static/js/package-lock.json

      - name: Install JS deps (Vitest)
        if: hashFiles('webui_app/static/js/package-lock.json') != ''
        working-directory: webui_app/static/js
        run: npm ci

      - name: Run JS unit tests (Vitest)
        if: hashFiles('webui_app/static/js/package-lock.json') != ''
        working-directory: webui_app/static/js
        run: npm test

      - name: Run tests
        # -n auto (pytest-xdist) parallelises across the runner's cores. The suite
        # is determinism-verified under workers: PYTHONHASHSEED=0 is set per worker
        # via pytest-env (+ job env above for subprocess tests), the footprint gate
        # hard-fails on seed != 0, and every store/lock path resolves to a per-worker
        # sandbox. --timeout=30 is per-test (pytest-timeout) and unaffected by xdist.
        # --strict-markers + --strict-config are passed on the CLI here, NOT via
        # pyproject [tool.pytest.ini_options] addopts: this repo's conftest does
        # heavy module-level imports (HOME redirect + registry/adapters) that load
        # before an addopts strict flag takes effect, so from addopts an unknown
        # marker silently downgrades to a warning. On the CLI it correctly errors at
        # collection. Verified 2026-06-01 (Wave 3 — test-framework maturation).
        run: |
          python -m pytest tests/ -v --tb=short --timeout=30 -n auto --strict-markers --strict-config

      - name: Check code style (compile + AST)
        run: |
          # py_compile every source file — catches syntax errors at module level
          python -m py_compile src/backlink_publisher/**/*.py
          # ast.parse every source file — catches syntax errors at function/class level
          python -c "
          import ast, sys, pathlib
          for f in pathlib.Path('src').rglob('*.py'):
              try:
                  ast.parse(f.read_text())
              except SyntaxError as e:
                  print(f'SYNTAX ERROR in {f}: {e}')
                  sys.exit(1)
          "

      - name: Check formatting with Black (blocking — only changed files)
        run: |
          # If on a PR, check only the changed files; fall back to full src/ if not
          if [ -n "${{ github.event.pull_request.number }}" ]; then
            git fetch origin ${{ github.base_ref }} --depth=1 2>/dev/null || true
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.py' | grep -E '\.py$' || true)
          else
            CHANGED=$(git diff --name-only HEAD~1 -- '*.py' | grep -E '\.py$' || true)
          fi
          if [ -z "$CHANGED" ]; then
            echo "No Python files changed — skipping Black check."
          else
            echo "Checking:"
            echo "$CHANGED"
            black --check --diff $CHANGED
          fi

      - name: Type check (non-blocking)
        run: |
          python -m mypy src/backlink_publisher --config-file mypy.ini || true
        continue-on-error: true

      - name: Verify fixtures exist
        run: |
          python generate_fixtures.py
          test -f fixtures/seed.jsonl

      # NOTE: The 4-step `python -m` smoke pipeline (Generate / Validate / Dry-run
      # publish / Show) that used to live here was deleted in 2026-05-20.
      # Until commit 4a3ecf0 restored the `python -m backlink_publisher.cli.plan_backlinks`
      # entry-point, all four steps silently exited 0 with empty stdout — the
      # package's `__main__.py` had been left empty by the plan_backlinks decomp.
      # When the entry-point was repaired, the real pipeline ran against the
      # placeholder fixture URLs (example.com / blog.example.org / tech.ru), the
      # content-gate dropped every row as unreachable, and the steps started
      # exiting 2. The steps were never a meaningful smoke test — they only
      # passed by accident — and the unit suite (`pytest tests/`) plus
      # `plan-claims-gate` exercise the real contracts. End-to-end coverage
      # belongs in a dedicated integration job with reachable fixture content,
      # tracked separately (see Plan 008 follow-ups).