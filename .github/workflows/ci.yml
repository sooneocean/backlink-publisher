name: Backlink Publisher CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short --timeout=30

      - name: Check code style
        run: |
          python -m py_compile src/backlink_publisher/**/*.py
          python -c "
          import ast, sys, pathlib
          for f in pathlib.Path('src').rglob('*.py'):
              try:
                  ast.parse(f.read_text())
              except SyntaxError as e:
                  print(f'SYNTAX ERROR in {f}: {e}')
                  sys.exit(1)
          "

      - name: Verify fixtures exist
        run: |
          python generate_fixtures.py
          test -f fixtures/seed.jsonl

      - name: Generate planned output
        run: |
          cat fixtures/seed.jsonl | python -m backlink_publisher.cli.plan_backlinks > /tmp/planned.jsonl 2>/dev/null
          wc -l /tmp/planned.jsonl

      - name: Validate planned output
        run: |
          cat /tmp/planned.jsonl | python -m backlink_publisher.cli.validate_backlinks --no-check-urls > /tmp/validated.jsonl 2>/dev/null
          wc -l /tmp/validated.jsonl

      - name: Dry-run publish
        run: |
          cat /tmp/validated.jsonl | python -m backlink_publisher.cli.publish_backlinks --mode draft --dry-run > /tmp/published.jsonl 2>/dev/null
          wc -l /tmp/published.jsonl

      - name: Show publish dry-run output
        run: cat /tmp/published.jsonl