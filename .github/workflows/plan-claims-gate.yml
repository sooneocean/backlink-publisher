name: Plan Claims Gate

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: plan-claims-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: plan-claims-gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch origin/main
        # Belt + suspenders alongside fetch-depth: 0. plan-check resolves
        # paths and SHAs against origin/main at gate time (D8).
        run: git fetch origin main

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install plan-check (base deps only)
        # NO `[dev]` extra — the gate does not run pytest. Keeps the
        # install footprint small per D6's "lightweight standalone" framing.
        run: pip install -e .

      - name: Resolve PR base + head refs
        id: refs
        run: |
          echo "base_sha=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          echo "head_sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"

      - name: List touched plan-docs
        id: touched
        run: |
          # $base...$head diff finds plan-docs added or modified in this PR
          # (D12 semantics). `--diff-filter=d` excludes deletions so a PR
          # that legitimately archives a plan-doc doesn't false-block on
          # `plan-check <deleted-path>` -> UsageError exit 1. Renames are
          # kept (renamed-to paths still need validation). `|| true`
          # suppresses grep's exit 1 on no matches.
          touched=$(git diff --name-only --diff-filter=d \
            "${{ steps.refs.outputs.base_sha }}...${{ steps.refs.outputs.head_sha }}" \
            -- 'docs/plans/*.md' 'docs/plans/**/*.md' || true)
          if [ -z "$touched" ]; then
            echo "No plan-docs touched in this PR — gate is a no-op."
            echo "have_plans=false" >> "$GITHUB_OUTPUT"
          else
            echo "Touched plan-docs:"
            printf '  %s\n' $touched
            echo "have_plans=true" >> "$GITHUB_OUTPUT"
            # Persist the file list to a state file for the next step
            printf '%s\n' $touched > /tmp/plan-claims-gate-touched.txt
          fi

      - name: Run plan-check on each touched plan-doc
        if: steps.touched.outputs.have_plans == 'true'
        run: |
          fail=0
          while IFS= read -r plan; do
            [ -z "$plan" ] && continue
            echo "::group::plan-check $plan"
            if plan-check "$plan"; then
              echo "::endgroup::"
            else
              rc=$?
              echo "::endgroup::"
              echo "::error file=$plan::plan-check failed with exit $rc"
              fail=1
            fi
          done < /tmp/plan-claims-gate-touched.txt
          exit $fail
